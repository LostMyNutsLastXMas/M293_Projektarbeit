<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Wochend-Planer</title>
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo"><img src="img/logo.png" alt="Wochend-Planer Logo"></div>
  </header>

  <!-- Login -->
  <main class="login-main">
    <div class="login-card">
      <h2>Willkommen zurück</h2>
      <p class="login-subtitle">Melde dich an, um deinen Wochend-Planer zu öffnen.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginBenutzername">Benutzername</label>
          <input type="text" id="loginBenutzername" placeholder="Benutzername" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPasswort">Passwort</label>
          <input type="password" id="loginPasswort" placeholder="Passwort" autocomplete="current-password">
        </div>

        <p class="login-fehler" id="loginFehler">Benutzername oder Passwort falsch.</p>

        <button type="submit" class="btn-login">Einloggen</button>

        <button type="button" class="btn-passwort-vergessen" id="btnPasswortVergessen">Passwort vergessen?</button>
      </form>

      <!-- Passwort zurücksetzen -->
      <div class="passwort-reset" id="passwortReset">
        <h3>Neues Passwort festlegen</h3>
        <div class="form-group">
          <label for="neuesPasswort">Neues Passwort</label>
          <input type="password" id="neuesPasswort" placeholder="Neues Passwort eingeben">
        </div>
        <p class="login-fehler" id="resetFehler">Bitte ein Passwort eingeben.</p>
        <div class="reset-buttons">
          <button type="button" class="btn-abbrechen-reset" id="btnResetAbbrechen">Abbrechen</button>
          <button type="button" class="btn-login" id="btnResetSpeichern">Speichern</button>
        </div>
        <p class="reset-erfolg" id="resetErfolg">Passwort wurde gespeichert!</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2026 Wochend-Planer. Alle Rechte vorbehalten.
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
