<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Wochend-Planer</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">Wochend-Planer</div>
  </header>

  <!-- Login -->
  <main class="login-main">
    <div class="login-card">
      <h2>Willkommen zurück</h2>
      <p class="login-subtitle">Melde dich an, um deinen Wochend-Planer zu öffnen.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginBenutzername">Benutzername</label>
          <input type="text" id="loginBenutzername" placeholder="Benutzername" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPasswort">Passwort</label>
          <input type="password" id="loginPasswort" placeholder="Passwort" autocomplete="current-password">
        </div>

        <p class="login-fehler" id="loginFehler">Benutzername oder Passwort falsch.</p>

        <button type="submit" class="btn-login">Einloggen</button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2026 Wochend-Planer. Alle Rechte vorbehalten.
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
